server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

logging.level.root=INFO
logging.level.com.example.secureadmin=INFO

app.jwt.secret=${JWT_SECRET}
app.jwt.issuer=${JWT_ISSUER:final-secure-admin-api}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

app.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@example.com}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
