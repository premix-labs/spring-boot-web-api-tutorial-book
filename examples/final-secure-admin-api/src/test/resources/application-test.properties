spring.datasource.url=jdbc:h2:mem:secure_admin;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

logging.level.root=WARN
logging.level.com.example.secureadmin=DEBUG

app.jwt.secret=test-secret-key-for-integration-tests-change-in-real-apps
app.jwt.issuer=final-secure-admin-api-test
app.jwt.expiration-seconds=3600

app.bootstrap.admin.enabled=false
app.bootstrap.admin.username=admin
app.bootstrap.admin.email=admin@example.com
app.bootstrap.admin.password=admin12345
